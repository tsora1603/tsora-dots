$hypr = ~/.config/hypr
$hl = $hypr/hyprland

exec-once = qs -c noctalia-shell
exec-once = ~/.local/bin/noctalia-lock.sh
exec-once = equibop
exec-once = /usr/local/libexec/file_manager_dbus
exec-once = kitty -T kitty-dev

# web apps
exec-once = gio launch /home/tsora/.local/share/applications/FFPWA-01KN1WRS8SVY17ZCKCRHNPYBB0.desktop
exec-once = gio launch /home/tsora/.local/share/applications/FFPWA-01KN1XGSR7CN72MV5MW8AFQTZ4.desktop

general {
  layout = scrolling
  gaps_in = 5
  gaps_out = 8,8,8,8
  allow_tearing = false
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

layerrule = match:namespace noctalia-shell:regionSelector, no_anim on
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.3
  blur = true
  blur_popups = true
}

# Configs
source = $hl/*

# >>> HYPRLAND VISUAL EDITOR START <<<
# 1. Active Uninstall Watchdog
exec-once = /home/tsora/.cache/noctalia/HVE/hve_watchdog.sh
# 2. Variable Definition (Color Palette)
source = /home/tsora/.config/hypr/noctalia/noctalia-colors.conf
# 3. Effects Application (Visual Editor)
source = /home/tsora/.cache/noctalia/HVE/overlay.conf
# >>> HYPRLAND VISUAL EDITOR END <<<
