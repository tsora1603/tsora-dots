$hypr = ~/.config/hypr
$hl = $hypr/hyprland

exec-once = qs -c noctalia-shell
exec-once = ~/.local/bin/noctalia-lock.sh
exec-once = sleep 2s
exec-once = dex /home/tsora/.local/share/applications/FFPWA-01KKQ5ZZY7DYXYAKMVP1YQC94S.desktop
exec-once = dex /home/tsora/.local/share/applications/FFPWA-01KKQ6ES7V8NJ7JZ5SVTG12M6H.desktop
exec-once = equibop

general {
  layout = scrolling
  gaps_in = 5
  gaps_out = 19,8,8,8
}

decoration {
  rounding = 20
  rounding_power = 2

  shadow {
    enabled = true
    range = 4
    render_power = 3
    color = rgba(1a1a1aee)
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    vibrancy = 0.1696
  }
}

layerrule = match:namespace noctalia-shell:regionSelector, no_anim on
layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.3
  blur = true
  blur_popups = true
}

# Configs
source = /home/tsora/.config/hypr/noctalia/noctalia-colors.conf
source = $hl/*
