[mgr]
show_hidden = false

[opener]
play = [
  { run = 'vlc "$@"', desc = "VLC", orphan = true, for = "linux" }
]
music = [
  { run = 'strawberry "$@"', orphan = true, for = "linux" }
]
view = [
  { run = 'feh "$@"', orphan = true, for = "linux" },
  { run = 'inkscape "$@"', orphan = true, for = "linux" }
]
edit = [
  { run = 'nano "$@"', block = true, for = "linux" },
  { run = 'sudo nano "$@"', block = true, for = "linux"},
  { run = 'vscodium "$@"', orphan = true, for = "linux"},
]
onlyoffice = [
  { run = '/usr/bin/desktopeditors "$@"', orphan = true, for = "linux"},
]
pdf = [ 
  { run = 'okular "$@"', orphan = true, for = "linux"},
]
extract = [
  { run = '7z x "$@"', desc = "Extract here", for = "linux" }
]

[open]
rules = [
  { mime = "application/pdf", use = "pdf" },
  { mime = "audio/*", use = "music" },
  { mime = "video/*", use = "play" },
  { mime = "image/*", use = "view" },
  { mime = "application/{zip,7z-compressed,rar,tar,xz}", use = "extract" },
  { mime = "application/openxml*", use = "onlyoffice" },
  { mime = "{text,application}/*", use = "edit" },
]

[plugin]
  prepend_preloaders = [
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*", run = "mediainfo" },
    { mime = "application/subrip", run = "mediainfo" },

    # Adobe Photoshop is image/adobe.photoshop, already handled above
    # Adobe Illustrator
    { mime = "application/postscript", run = "mediainfo" },
    { mime = "application/illustrator", run = "mediainfo" },
    { mime = "application/dvb.ait", run = "mediainfo" },
    { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },
    { mime = "application/eps", run = "mediainfo" },

    # Sometimes AI file is recognized as "application/pdf". Lmao.
    # In this case use file extension instead:
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]
  
  prepend_previewers = [
    { mime = "application/{*zip,tar,bzip2,7z*,rar,xz,zstd,java-archive}", run = "ouch" },
 
    { url = "*.csv", run = "rich-preview"}, # for csv files
    { url = "*.md", run = "rich-preview" }, # for markdown (.md) files
    { url = "*.rst", run = "rich-preview"}, # for restructured text (.rst) files
    { url = "*.ipynb", run = "rich-preview"}, # for jupyter notebooks (.ipynb)
    { url = "*.json", run = "rich-preview"}, # for json (.json) files
#    { url = "*.lang_type", run = "rich-preview"} # for particular language files eg. .py, .go., .lua, etc.
    
    # Replace magick, image, video with mediainfo
    { mime = "{audio,video,image}/*", run = "mediainfo"},
    { mime = "application/subrip", run = "mediainfo" },
    
    # Adobe Photoshop is image/adobe.photoshop, already handled above
    # Adobe Illustrator
    { mime = "application/postscript", run = "mediainfo" },
    { mime = "application/illustrator", run = "mediainfo" },
    { mime = "application/dvb.ait", run = "mediainfo" },
    { mime = "application/vnd.adobe.illustrator", run = "mediainfo" },
    { mime = "image/x-eps", run = "mediainfo" },
    { mime = "application/eps", run = "mediainfo" },

    # Sometimes AI file is recognized as "application/pdf". Lmao.
    # In this case use file extension instead:
    { url = "*.{ai,eps,ait}", run = "mediainfo" },
  ]
  # There are more extensions, mime types which are supported by mediainfo.
  # Just add file's MIME type to `previewers`, `preloaders` above.
  # https://mediaarea.net/en/MediaInfo/Support/Formats
  # If it's not working, file an issue at https://github.com/boydaihungst/mediainfo.yazi/issues

# For a large file like Adobe Illustrator, Adobe Photoshop, etc
# you may need to increase the memory limit if no image is rendered.
# https://yazi-rs.github.io/docs/configuration/yazi#tasks
[tasks]
  image_alloc      = 1073741824        # = 1024*1024*1024 = 1024MB

[[plugin.prepend_fetchers]]
id  = "git"
url = "*"
run = "git"

[[plugin.prepend_fetchers]]
id  = "git"
url = "*/"
run = "git"
